server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers with the project label
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: neuronsinterview
        action: keep
      # Use the service name as the "service" label
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      # Use the container name as the "container" label
      - source_labels: ["__meta_docker_container_name"]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      # Parse JSON logs from the backend
      - match:
          selector: '{service="backend"}'
          stages:
            - json:
                expressions:
                  event: event
                  level: level
                  job_id: job_id
                  agent: agent
                  provider: provider
            - labels:
                event:
                level:
                job_id:
                agent:
                provider:
